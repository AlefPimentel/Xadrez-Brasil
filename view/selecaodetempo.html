<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez Brasil - Configuração</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Estilo/selecaodetempo.css">
</head>
<body class="config-body">

    <a href="../index.html" class="config-back-btn">⬅ Voltar</a>

    <div class="config-screen-container"> 
        
        <div class="config-card">
            
            <h2 class="config-title">PREPARAR PARTIDA</h2>

            <div class="config-layout-split">
                
                <div class="config-time-section">
                    <label class="config-label">Controle de Tempo:</label>
                    
                    <div class="config-time-grid">
                        <button type="button" class="time-btn active btn-full-width" data-time="0|0">
                            <span class="infinity-icon">∞</span><small>Sem Tempo (Infinito)</small>
                        </button>
                        
                        <button type="button" class="time-btn" data-time="1|0"><span>1 min</span><small>Bullet</small></button>
                        <button type="button" class="time-btn" data-time="1|1"><span>1 | 1</span><small>Bullet</small></button>
                        <button type="button" class="time-btn" data-time="1|3"><span>1 | 3</span><small>Bullet</small></button>
                        
                        <button type="button" class="time-btn" data-time="3|0"><span>3 min</span><small>Blitz</small></button>
                        <button type="button" class="time-btn" data-time="3|3"><span>3 | 3</span><small>Blitz</small></button>
                        <button type="button" class="time-btn" data-time="3|5"><span>3 | 5</span><small>Blitz</small></button>
                        
                        <button type="button" class="time-btn" data-time="10|0"><span>10 min</span><small>Rápida</small></button>
                        <button type="button" class="time-btn" data-time="10|5"><span>10 | 5</span><small>Rápida</small></button>
                        <button type="button" class="time-btn" data-time="10|10"><span>10 | 10</span><small>Rápida</small></button>
                        
                        <button type="button" class="time-btn" data-time="30|0"><span>30 min</span><small>Clássica</small></button>
                        <button type="button" class="time-btn" data-time="60|0"><span>60 min</span><small>Clássica</small></button>
                        <button type="button" class="time-btn" data-time="90|0"><span>90 min</span><small>Clássica</small></button>
                    </div>
                </div>

                <div class="config-actions-section">
                    <div class="config-options-panel">
                        
                        <div class="config-group">
                            <label class="config-label">Barra de Avaliação:</label>
                            <div class="eval-btn-row">
                                <button type="button" class="eval-option-btn" data-eval="on">ON</button>
                                <button type="button" class="eval-option-btn active" data-eval="off">OFF</button>
                            </div>
                        </div>

                        <div class="config-group">
                            <label class="config-label">Jogar de:</label>
                            <div class="side-selection-row">
                                <button type="button" class="side-btn" data-color="w" title="Brancas">⬜</button>
                                <button type="button" class="side-btn active" data-color="random" title="Aleatório">🎲</button>
                                <button type="button" class="side-btn" data-color="b" title="Pretas">⬛</button>
                            </div>
                        </div>

                    </div>

                    <button id="btn-jogar" class="main-play-btn">JOGAR</button>
                </div>

            </div> </div>
    </div>

    <script type="module" src="../Script/relogio/selecaodetempo.js"></script>
</body>
</html>
